plugins {
    id "com.android.application"
    id "com.chaquo.python"
}

android {
    namespace "com.stockanalysis.dashboard"
    compileSdk 35

    defaultConfig {
        applicationId "com.stockanalysis.dashboard"
        minSdk 26
        targetSdk 35
        versionCode 1
        versionName "1.0.0"
        ndk {
            abiFilters "arm64-v8a", "armeabi-v7a", "x86_64"
        }
    }

    sourceSets {
        main {
            python.srcDirs = ["src/main/python"]
        }
    }
}

chaquopy {
    defaultConfig {
        version "3.11"
        if (project.hasProperty("chaquopyBuildPython")) {
            buildPython project.property("chaquopyBuildPython")
        }
        pip {
            install "Flask==3.0.3"
            install "flask-cors==4.0.1"
            install "requests==2.32.3"
        }
    }
}

dependencies {}
